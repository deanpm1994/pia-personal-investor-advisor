name: Pull Request Quality Gates

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: pull-request-quality-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  web:
    name: Web quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.13.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:web

  api:
    name: API quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: 0.7.16
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - run: uv sync --locked --directory apps/api
      - run: uv run --directory apps/api ruff check .
      - run: uv run --directory apps/api ruff format --check .
      - run: uv run --directory apps/api pytest
